spring:
  application:
    name: notification-service

  # ??? MySQL ??????????????????????????????????????????????????????????????
  datasource:
    url: jdbc:mysql://localhost:3306/voom_notifications?createDatabaseIfNotExist=true
    username: root
    password: motDePasse
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ??? JPA ????????????????????????????????????????????????????????????????
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ??? Kafka ??????????????????????????????????????????????????????????????
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.voom.*"
        spring.json.value.default.type: com.voom.notification.event.NotificationEvent
        spring.json.use.type.headers: false

# ??? Server ???????????????????????????????????????????????????????????????
server:
  port: 8083

# ??? Actuator ?????????????????????????????????????????????????????????????
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ??? Logging ??????????????????????????????????????????????????????????????
logging:
  level:
    com.voom.notification: DEBUG
    org.springframework.kafka: WARN