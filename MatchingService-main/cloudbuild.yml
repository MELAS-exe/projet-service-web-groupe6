# ════════════════════════════════════════════════════════════════════
# Cloud Build — Pipeline CI/CD pour Voom Matching Service
# ════════════════════════════════════════════════════════════════════
# Déclenchement : push sur la branche main/dev
# Étapes :
#   1. Build de l'image Docker
#   2. Push vers Artifact Registry
#   3. Déploiement sur Cloud Run (dev)
# ════════════════════════════════════════════════════════════════════

substitutions:
  _PROJECT_ID: voom-482712
  _REGION: europe-west9
  _SERVICE_NAME: matching-service-dev
  _IMAGE: europe-west9-docker.pkg.dev/voom-482712/voom-repo/matching-service
  _CLOUD_SQL_INSTANCE: voom-482712:europe-west9:voom-matching-service-dev

steps:

  # ── Étape 1 : Build de l'image Docker ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'   # tag avec le hash du commit
      - '-t'
      - '${_IMAGE}:latest'
      - '.'

  # ── Étape 2 : Push vers Artifact Registry ──────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE}'

  # ── Étape 3 : Déploiement sur Cloud Run ────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'

      # ── Ressources Cloud Run (dev — minimal pour économiser) ────────
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'        # scale-to-zero la nuit
      - '--max-instances=3'        # max 3 instances en dev
      - '--concurrency=80'
      - '--timeout=60'

      # ── Connexion Cloud SQL ─────────────────────────────────────────
      - '--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}'
      - '--service-account=matching-service-sa@${_PROJECT_ID}.iam.gserviceaccount.com'

      # ── Variables d'environnement ───────────────────────────────────
      - '--set-env-vars=SPRING_PROFILES_ACTIVE=prod'
      - '--set-env-vars=CLOUD_SQL_INSTANCE=${_CLOUD_SQL_INSTANCE}'

      # ── Secrets (depuis Google Secret Manager) ──────────────────────
      - '--set-secrets=DB_USER=voom-db-user:latest'
      - '--set-secrets=DB_PASSWORD=voom-db-password:latest'

# Image finale stockée dans Artifact Registry
images:
  - '${_IMAGE}:${SHORT_SHA}'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Build plus rapide