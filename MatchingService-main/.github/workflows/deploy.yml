name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: voom-482712
  REGION: europe-west9
  SERVICE_NAME: matchingservice-dev
  REGISTRY: europe-west9-docker.pkg.dev
  REPOSITORY: voom
  IMAGE: matchingservice

jobs:

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & Push Docker image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # Exactement la même commande que le déploiement manuel qui fonctionnait
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_TAG }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:voom-matching-service-dev \
            --set-env-vars=SPRING_PROFILES_ACTIVE=prod \
            --set-env-vars=CLOUD_SQL_INSTANCE=${{ env.PROJECT_ID }}:${{ env.REGION }}:voom-matching-service-dev \
            --set-env-vars=DB_USERNAME=${{ secrets.DB_USERNAME }} \
            --set-env-vars=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=1 \
            --project=${{ env.PROJECT_ID }}

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)' \
            --project=${{ env.PROJECT_ID }})
          echo "Service deployé : $URL"