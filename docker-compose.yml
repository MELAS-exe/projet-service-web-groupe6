version: '3.8'

services:
  # Base de données pour les messages
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      covoiturage-net:
        aliases:
          - localhost

  # Message Queue (pour la communication inter-services future)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Interface d'administration web
    networks:
      - covoiturage-net

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    networks:
      - covoiturage-net
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config-repo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - covoiturage-net

  messaging-service:
    build: ./messaging-service
    container_name: messaging-service
    ports:
      - "0.0.0.0:8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_ADDRESS=0.0.0.0
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/messaging_db
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=messaging_db
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=messaging_db
    depends_on:
      config-server:
        condition: service_healthy
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - covoiturage-net

  matching-service:
    build: ./MatchingService-main
    container_name: matching-service
    ports:
      - "8086:8086"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - covoiturage-net

  iam-service:
    build: ./iam-service
    container_name: iam-service
    ports:
      - "8087:8087"
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_started
    networks:
      - covoiturage-net

  # Base de données MySQL pour IAM et notifications
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=motDePasse
      - MYSQL_DATABASE=voom_iam_db
    networks:
      - covoiturage-net

  # Base de données PostgreSQL pour les paiements et matching
  postgres:
    image: postgis/postgis:15-3.3
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - covoiturage-net
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - covoiturage-net

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - covoiturage-net

  notification-service:
    build: ./notification-service-master
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - covoiturage-net

  payment-service:
    build: ./payment-service-main
    container_name: payment-service
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - covoiturage-net

networks:
  covoiturage-net:
    driver: bridge